<svg xmlns="http://www.w3.org/2000/svg" transform-origin="50% 50%" width="24" height="24"
    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round" class="feather feather-loader">
    <style type="text/css">:root {
        /* note: svg does not inherit color if it's an 'img' element */
        --fg-default: hsl(190.5, 31.8%, 64.9%);
        --green: hsl(70, 31.6%, 62.7%);
        --fg: var( --green );
        --fg: var( --fg-default );

        color: var(--fg);
        }
    </style>
    <line x1="12" y1="2" x2="12" y2="6"></line>
    <line x1="12" y1="18" x2="12" y2="22"></line>
    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
    <line x1="2" y1="12" x2="6" y2="12"></line>
    <line x1="18" y1="12" x2="22" y2="12"></line>
    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
    <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
    <animateTransform attributeName="transform" from="0" to="360" dur="3.4s"
        repeatCount="indefinite" attributeType="xml" type="rotate" />
</svg>